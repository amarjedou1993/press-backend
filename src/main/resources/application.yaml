spring:
  application:
    name: press-accreditation

  profiles:
    active: dev   # overridden in prod via SPRING_PROFILES_ACTIVE=prod

  jpa:
    open-in-view: false          # IMPORTANT — see notes below
    hibernate:
      ddl-auto: validate         # Flyway owns the schema. Never 'update'.
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB        # must match app.storage.max-file-size-bytes
      max-request-size: 12MB     # one file per upload request + multipart overhead

  jackson:
    time-zone: UTC
    default-property-inclusion: non_null

  mail:
    default-encoding: UTF-8      # French accents in notification emails

server:
  port: 8080
  shutdown: graceful             # finish in-flight requests on deploy

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true            # /actuator/health/liveness + /readiness

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ════════════════════════════════════════════════════
# Application configuration → binds to AppProperties
# (Khidmaty block removed — returns in V2 with the feature
#  and spring-boot-starter-oauth2-resource-server)
# ════════════════════════════════════════════════════
app:
  jwt:
    access-token-ttl: 24h

  storage:
    max-file-size-bytes: 10485760          # 10 MB — keep in sync with multipart above
    allowed-mime-types:
      - application/pdf
      - image/jpeg
      - image/png

  identity:
    nni-regex: "^\\d{10}$"
    phone-regex: "^(\\+222)?[234]\\d{7}$"      # NEW — confirm format with HAPA

  card:
    validity: 365d                          # PLACEHOLDER — pending HAPA card design (week 6)
    number-prefix: CARD                     # PLACEHOLDER — numbering convention pending HAPA

  application:
    number-prefix: APP
    max-correction-rounds: 1               # V1.3 §H — one correction round, hard limit

  session:
    # V1.3 §F: phases close by EXPLICIT admin action — there is no automatic
    # phase transition. This cron only drives the correction-deadline check:
    # applications still in CORRECTION_REQUESTED after correction_end are
    # auto-rejected with the unanswered correction request as justification (§G.5).
    correction-deadline-cron: "0 */5 * * * *"

  locale:
    default-language: FR
    supported-languages: [FR, AR]

  security:
    auth-requests-per-minute: 10
    password-regex: "^(?=.*[A-Za-z])(?=.*\\d).{8,100}$"
  cors:
    allowed-origins: []