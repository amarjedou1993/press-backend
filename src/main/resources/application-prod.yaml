spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000

  jpa:
    show-sql: false

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
  forward-headers-strategy: framework   # correct client IPs behind nginx/reverse proxy

springdoc:
  # No public API console on a government production system
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.presscard: INFO
    org.springframework.security: WARN

app:
  jwt:
    issuer: ${APP_JWT_ISSUER}
    private-key-location: file:${JWT_PRIVATE_KEY_PATH:/etc/press-accreditation/keys/private.pem}
    public-key-location: file:${JWT_PUBLIC_KEY_PATH:/etc/press-accreditation/keys/public.pem}

  storage:
    root-directory: ${STORAGE_ROOT:/var/lib/press-accreditation/storage}

  email:
    enabled: ${EMAIL_ENABLED:true}
    from: ${EMAIL_FROM}
    commission-inbox: ${COMMISSION_INBOX}
